name: CI

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun test --preload ./src/test/preload.ts src/routes

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm install -g @caprover/cli@2.3.1
      - run: |
          caprover deploy \
            --caproverUrl "${{ secrets.CAPROVER_URL }}" \
            --appName "${{ secrets.CAPROVER_APP }}" \
            --caproverPassword "${{ secrets.CAPROVER_PASSWORD }}" \
            --branch main
